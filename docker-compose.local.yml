services:
  postgres:
    image: postgres:16-alpine
    container_name: meta-ads-builder-postgres-local
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: meta_ads_builder_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - meta_ads_builder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meta_ads_builder_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  meta_ads_builder_postgres_data:
