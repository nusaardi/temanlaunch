services:
  - type: web
    name: temanlaunch-web
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  - type: web
    name: temanlaunch-api
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: temanlaunch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AI_CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://temanlaunch.my.id,https://www.temanlaunch.my.id
      - key: CORS_ALLOW_RENDER_ORIGINS
        value: true
      - key: ENFORCE_CREDITS
        value: false
      - key: DEFAULT_FREE_CREDITS
        value: 200
      - key: INPUT_TOKEN_COST_USD_PER_1K
        value: 0
      - key: OUTPUT_TOKEN_COST_USD_PER_1K
        value: 0
      - key: AI_DEFAULT_PROVIDER
        value: bedrock_dev
      - key: AWS_REGION
        value: us-east-1
      - key: MODEL_ID
        value: us.anthropic.claude-sonnet-4-6
      - key: ADMIN_USERNAMES
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false

databases:
  - name: temanlaunch-db
    databaseName: temanlaunch
    user: temanlaunch
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

previews:
  generation: none
